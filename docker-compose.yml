# docker-compose.yml
#
# 3 service:
# 1. "app" - chính EventHub backend, kết nối RA NGOÀI tới các dịch vụ
#    cloud (Neon, Upstash, CloudAMQP, Cloudinary) qua .env - không tự
#    host Postgres/Redis/RabbitMQ nào (quyết định từ Phase 1/15).
# 2. "prometheus" - "kéo" (scrape) dữ liệu từ endpoint /metrics của "app"
#    mỗi 10 giây, lưu lại thành dữ liệu dạng time-series.
# 3. "grafana" - đọc dữ liệu từ Prometheus, vẽ dashboard trực quan.
#
# LƯU Ý: 2 service prometheus/grafana chỉ để BẠN TỰ XEM giám sát khi
# chạy `docker compose up` TRÊN MÁY MÌNH (local) - khi deploy thật lên
# Render (Phase 16 CD), Render CHỈ chạy đúng 1 container "app" (Free
# tier không hỗ trợ multi-container) - endpoint /metrics vẫn tồn tại
# trên Render, nhưng bạn cần Prometheus/Grafana chạy Ở NƠI KHÁC (VD máy
# cá nhân, hoặc Grafana Cloud free tier) để scrape từ xa nếu muốn giám
# sát production thật - đây là điểm đáng ghi chú rõ trong README.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventhub-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
    dns:
      - 1.1.1.1
      - 8.8.8.8
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: eventhub-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090' # giao diện web Prometheus (đơn giản, chủ yếu dùng để debug query PromQL thô)
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: eventhub-grafana
    restart: unless-stopped
    ports:
      - '3001:3000' # 3001 vì 3000 hay bị chiếm bởi Frontend dev server (React/Vite mặc định)
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin # CHỈ dùng cho local demo - đổi ngay nếu public ra ngoài
    depends_on:
      - prometheus