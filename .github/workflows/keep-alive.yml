name: Keep Render Awake

# Chạy mỗi 10 phút - dưới ngưỡng 15 phút idle mà Render dùng để
# spin-down, giữ container luôn ở trạng thái "có traffic gần đây".
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: # cho phép bấm chạy tay để test thử ngay lập tức

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: curl -f https://eventhub-1lf8.onrender.com/health
