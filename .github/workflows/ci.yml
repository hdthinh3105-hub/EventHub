name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Biến môi trường GIẢ - chỉ cần ĐÚNG ĐỊNH DẠNG để qua bước validate
    # của Zod (env.ts, Phase 3), KHÔNG cần kết nối thật. Bộ test hiện
    # tại chỉ dừng ở tầng middleware (401/400), không query DB/Redis/
    # RabbitMQ thật.
    env:
      NODE_ENV: test
      DATABASE_URL: 'postgresql://user:password@localhost:5432/eventhub_ci'
      JWT_ACCESS_SECRET: 'ci_test_access_secret_at_least_32_characters_long'
      JWT_REFRESH_SECRET: 'ci_test_refresh_secret_at_least_32_characters_long_x'
      REDIS_URL: 'redis://localhost:6379'
      RABBITMQ_URL: 'amqp://localhost'
      GMAIL_USER: 'ci-test@example.com'
      GMAIL_APP_PASSWORD: 'dummy_app_password'
      CLOUDINARY_CLOUD_NAME: 'dummy_cloud'
      CLOUDINARY_API_KEY: 'dummy_key'
      CLOUDINARY_API_SECRET: 'dummy_secret'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cài đặt package
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Kiểm tra type TypeScript (không build ra file)
        run: npx tsc --noEmit

      - name: Chạy test (Jest)
        run: npm test

      - name: Build production (đảm bảo build thật không lỗi)
        run: npm run build

  # --- CD: chỉ chạy khi build-and-test THÀNH CÔNG, và CHỈ khi push
  # thẳng vào main (không chạy cho Pull Request - tránh deploy code
  # chưa được review/merge). Đây chính là điểm khác biệt giữa CI đơn
  # thuần (chỉ kiểm tra) và CI/CD thật sự (kiểm tra XONG mới đưa lên
  # môi trường chạy thật).
  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Gọi Render Deploy Hook
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"